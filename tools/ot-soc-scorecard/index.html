  <!--
    TEMPLATE: Metric Scorecard Tool
    ──────────────────────────────────────────────────────
    Pattern: 6 metric cards with numeric inputs → score calculation → results.
    Reusable: All JS logic, scoring, badge color rules, print pattern.
    Rebuild per site:
      - Metric names and numbers (01–06 labels)
      - Metric descriptions
      - Benchmark thresholds and descriptions
      - Good/Fair/Poor threshold values in scoreMetric()
      - Score summary text tiers in summarize()
      - Companion guide link
    Search for all <!-- CONTENT --> comments and replace them.
  -->

  <style>:root{--accent:#000000;--accent-dim:#000000;--accent-pale:#f5f5f5}</style>
  <link rel="stylesheet" href="/styles.css">
  <script src="/config.js" defer></script>

  <style>
    .metric-card { border: var(--hairline); background: var(--surface); padding: 20px 24px; margin-bottom: 12px; }
    .metric-card-header {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 16px; margin-bottom: 8px; flex-wrap: wrap;
    }
    .metric-card-title { font-size: var(--small); font-weight: 700; color: var(--charcoal); }
    .metric-card-num { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--faint); flex-shrink: 0; }
    .metric-card-desc { font-size: 11px; color: var(--mid); font-style: italic; margin-bottom: 14px; line-height: 1.6; }
    .metric-input-row { display: grid; grid-template-columns: 1fr 160px; gap: 12px; align-items: center; }
    .metric-input-label { font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: var(--mid); }
    .metric-input-wrap { display: flex; align-items: center; gap: 8px; }
    .metric-input {
      font-family: 'Space Mono', monospace; font-size: var(--small);
      padding: 7px 10px; border: var(--hairline); background: var(--bg);
      color: var(--charcoal); outline: none; width: 90px; text-align: right;
    }
    .metric-input:focus { border-color: var(--accent); }
    .metric-unit { font-size: 11px; color: var(--mid); white-space: nowrap; }
    .metric-benchmark { font-size: 11px; color: var(--faint); margin-top: 8px; font-style: italic; }
    .metric-unknown-row { margin-top: 8px; }
    .metric-unknown-row label { font-size: 11px; color: var(--mid); cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .score-btn {
      font-family: 'Space Mono', monospace; font-size: var(--small); font-weight: 700;
      letter-spacing: 0.05em; text-transform: uppercase; padding: 12px 32px;
      background: var(--accent); color: #fff; border: none; cursor: pointer; width: 100%; margin-top: 8px;
    }
    .score-btn:hover { background: var(--accent-dim); }
    .results-shell { display: none; margin-top: 32px; }
    .results-shell.visible { display: block; }
    .score-hero {
      border: var(--hairline); border-top: 3px solid var(--accent); background: var(--surface);
      padding: 28px 32px; margin-bottom: 24px;
      display: flex; align-items: center; gap: 32px; flex-wrap: wrap;
    }
    .score-hero-left { text-align: center; flex-shrink: 0; }
    .score-circle {
      width: 96px; height: 96px; border: 3px solid var(--accent);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      margin: 0 auto 8px;
    }
    .score-circle-num { font-size: 32px; font-weight: 700; color: var(--charcoal); line-height: 1; }
    .score-circle-denom { font-size: 11px; color: var(--mid); }
    .score-rating { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
    .score-hero-right { flex: 1; min-width: 200px; }
    .score-hero-label { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; display: block; }
    .score-summary { font-size: var(--small); color: var(--mid); line-height: 1.7; margin-bottom: 0; }
    .metric-result {
      border: var(--hairline); background: var(--surface); padding: 16px 20px; margin-bottom: 8px;
      display: grid; grid-template-columns: 1fr auto; gap: 12px 24px; align-items: start;
    }
    .metric-result-name { font-size: var(--small); font-weight: 700; color: var(--charcoal); margin-bottom: 4px; }
    .metric-result-finding { font-size: var(--small); color: var(--mid); line-height: 1.6; margin-bottom: 6px; }
    .metric-result-action { font-size: 11px; color: var(--charcoal); font-style: italic; border-top: var(--hairline); padding-top: 6px; margin-top: 2px; }
    .metric-score-badge { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; padding: 4px 10px; border: 1px solid; white-space: nowrap; flex-shrink: 0; }
    .badge-good { border-color: #2e7d32; color: #2e7d32; }
    .badge-fair { border-color: #b45309; color: #b45309; }
    .badge-poor { border-color: #a03020; color: #a03020; }
    .badge-unknown { border-color: var(--border); color: var(--mid); }
    .priority-section {
      border: var(--hairline); border-left: 3px solid #a03020;
      background: var(--surface); padding: 16px 20px; margin-bottom: 24px;
    }
    .priority-label { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #a03020; margin-bottom: 10px; display: block; }
    .print-bar { display: flex; justify-content: flex-end; margin-bottom: 16px; }
    .print-btn {
      font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
      letter-spacing: 0.05em; text-transform: uppercase; padding: 6px 16px;
      background: var(--accent); color: #fff; border: none; cursor: pointer;
    }
    .print-btn:hover { background: var(--accent-dim); }
    .restart-link {
      font-size: 11px; color: var(--mid); cursor: pointer; text-decoration: underline;
      background: none; border: none; font-family: 'Space Mono', monospace;
      padding: 0; margin-top: 8px; display: inline-block;
    }
    .restart-link:hover { color: var(--accent); }
    @media print {
      * { visibility: hidden; }
      #print-output, #print-output * { visibility: visible; }
      #print-output { position: fixed; top: 0; left: 0; width: 100%; padding: 32px; background: white; }
      .print-bar { display: none !important; }
    }
    @media (max-width: 600px) {
      .metric-input-row { grid-template-columns: 1fr; }
      .metric-result { grid-template-columns: 1fr; }
      .score-hero { flex-direction: column; }
    }
  </style>
</head>

            <div class="metric-input-row">

  <script>
    /*
     * ── Metric definitions ────────────────────────────────────────────────────
     * Replace each metric's name, unit, lowerIsBetter flag, and threshold values.
     * scoreMetric() is called with the raw input value for each metric.
     * good/fair thresholds define the rating boundaries.
     *
     * lowerIsBetter: true  → lower values score better (e.g. latency, false positive rate)
     *                false → higher values score better (e.g. coverage %)
     */

    var metrics = [
      {
        id: 'm1',
        name: '<!-- CONTENT: Metric 1 name -->',
        unit: '<!-- CONTENT: unit -->',
        lowerIsBetter: false,
        good: /* threshold value */ 80,
        fair: /* threshold value */ 60,
        findings: {
          good: '<!-- CONTENT: What good looks like for this metric. -->',
          fair: '<!-- CONTENT: What fair looks like. -->',
          poor: '<!-- CONTENT: What poor looks like. -->',
          unknown: '<!-- CONTENT: What to do about missing data. -->'
        },
        actions: {
          good: null,
          fair: '<!-- CONTENT: Action to take at fair level. -->',
          poor: '<!-- CONTENT: Action to take at poor level. -->',
          unknown: '<!-- CONTENT: How to start measuring this metric. -->'
        }
      },
      {
        id: 'm2',
        name: '<!-- CONTENT: Metric 2 name -->',
        unit: '<!-- CONTENT: unit -->',
        lowerIsBetter: true,
        good: 30,
        fair: 50,
        findings: { good: '<!-- CONTENT -->', fair: '<!-- CONTENT -->', poor: '<!-- CONTENT -->', unknown: '<!-- CONTENT -->' },
        actions: { good: null, fair: '<!-- CONTENT -->', poor: '<!-- CONTENT -->', unknown: '<!-- CONTENT -->' }
      },
      {
        id: 'm3',
        name: '<!-- CONTENT: Metric 3 name -->',
        unit: '<!-- CONTENT: unit -->',
        lowerIsBetter: false,
        good: /* threshold */ 70,
        fair: /* threshold */ 50,
        findings: { good: '<!-- CONTENT -->', fair: '<!-- CONTENT -->', poor: '<!-- CONTENT -->', unknown: '<!-- CONTENT -->' },
        actions: { good: null, fair: '<!-- CONTENT -->', poor: '<!-- CONTENT -->', unknown: '<!-- CONTENT -->' }
      },
      {
        id: 'm4',
        name: '<!-- CONTENT: Metric 4 name -->',
        unit: '<!-- CONTENT: unit -->',
        lowerIsBetter: true,
        good: /* threshold */ 15,
        fair: /* threshold */ 30,
        findings: { good: '<!-- CONTENT -->', fair: '<!-- CONTENT -->', poor: '<!-- CONTENT -->', unknown: '<!-- CONTENT -->' },
        actions: { good: null, fair: '<!-- CONTENT -->', poor: '<!-- CONTENT -->', unknown: '<!-- CONTENT -->' }
      },
      {
        id: 'm5',
        name: '<!-- CONTENT: Metric 5 name -->',
        unit: '<!-- CONTENT: unit -->',
        lowerIsBetter: false,
        good: /* threshold */ 90,
        fair: /* threshold */ 75,
        findings: { good: '<!-- CONTENT -->', fair: '<!-- CONTENT -->', poor: '<!-- CONTENT -->', unknown: '<!-- CONTENT -->' },
        actions: { good: null, fair: '<!-- CONTENT -->', poor: '<!-- CONTENT -->', unknown: '<!-- CONTENT -->' }
      },
      {
        id: 'm6',
        name: '<!-- CONTENT: Metric 6 name -->',
        unit: '<!-- CONTENT: unit -->',
        lowerIsBetter: false,
        good: /* threshold */ 90,
        fair: /* threshold */ 70,
        findings: { good: '<!-- CONTENT -->', fair: '<!-- CONTENT -->', poor: '<!-- CONTENT -->', unknown: '<!-- CONTENT -->' },
        actions: { good: null, fair: '<!-- CONTENT -->', poor: '<!-- CONTENT -->', unknown: '<!-- CONTENT -->' }
      }
    ];

    /* Score tier summaries — update text to match this market's context */
    var summaries = {
      high:    '<!-- CONTENT: Summary for 5-6 good scores -->',
      medium:  '<!-- CONTENT: Summary for 3-4 good scores -->',
      low:     '<!-- CONTENT: Summary for 1-2 good scores -->',
      critical:'<!-- CONTENT: Summary for 0 good scores -->'
    };

    function toggleUnknown(n) {
      var cb = document.getElementById('m' + n + '-unknown');
      var inp = document.getElementById('m' + n + '-val');
      inp.disabled = cb.checked;
      if (cb.checked) inp.value = '';
    }

    function scoreMetric(m, val, isUnknown) {
      if (isUnknown || val === null || val === '') return 'unknown';
      val = parseFloat(val);
      if (m.lowerIsBetter) {
        if (val <= m.good) return 'good';
        if (val <= m.fair) return 'fair';
        return 'poor';
      } else {
        if (val >= m.good) return 'good';
        if (val >= m.fair) return 'fair';
        return 'poor';
      }
    }

    function scorecard() {
      var scores = metrics.map(function(m, i) {
        var n = i + 1;
        var isUnknown = document.getElementById('m' + n + '-unknown').checked;
        var val = document.getElementById('m' + n + '-val').value;
        var rating = scoreMetric(m, val, isUnknown);
        return { m: m, val: val, rating: rating };
      });

      var goodCount = scores.filter(function(s) { return s.rating === 'good'; }).length;

      document.getElementById('score-num').textContent = goodCount;

      var ratingEl = document.getElementById('score-rating');
      var sumEl    = document.getElementById('score-summary');
      if (goodCount >= 5)      { ratingEl.textContent = 'Strong'; ratingEl.style.color = '#2e7d32'; sumEl.textContent = summaries.high; }
      else if (goodCount >= 3) { ratingEl.textContent = 'Developing'; ratingEl.style.color = '#b45309'; sumEl.textContent = summaries.medium; }
      else if (goodCount >= 1) { ratingEl.textContent = 'Weak'; ratingEl.style.color = '#a03020'; sumEl.textContent = summaries.low; }
      else                     { ratingEl.textContent = 'Critical'; ratingEl.style.color = '#a03020'; sumEl.textContent = summaries.critical; }

      /* Priority items (poor + unknown) */
      var priorities = scores.filter(function(s) { return s.rating === 'poor' || s.rating === 'unknown'; });
      var prioritySection = document.getElementById('priority-section');
      var priorityItems   = document.getElementById('priority-items');
      if (priorities.length) {
        prioritySection.style.display = '';
        priorityItems.innerHTML = priorities.map(function(s) {
          return '<p style="font-size:13px;color:var(--charcoal);margin-bottom:8px;"><strong>' + s.m.name + '</strong> — ' +
            (s.m.actions[s.rating] || s.m.findings[s.rating]) + '</p>';
        }).join('');
      } else {
        prioritySection.style.display = 'none';
      }

      /* Individual metric results */
      var badgeClass = { good: 'badge-good', fair: 'badge-fair', poor: 'badge-poor', unknown: 'badge-unknown' };
      var badgeLabel = { good: 'Good', fair: 'Fair', poor: 'Poor', unknown: 'Unknown' };
      document.getElementById('metric-results').innerHTML = scores.map(function(s) {
        var displayVal = s.rating === 'unknown' ? 'Not measured' : s.val + ' ' + s.m.unit;
        return '<div class="metric-result">' +
          '<div>' +
            '<div class="metric-result-name">' + s.m.name + '</div>' +
            '<div class="metric-result-finding">' + displayVal + ' &mdash; ' + s.m.findings[s.rating] + '</div>' +
            (s.m.actions[s.rating] ? '<div class="metric-result-action">' + s.m.actions[s.rating] + '</div>' : '') +
          '</div>' +
          '<span class="metric-score-badge ' + badgeClass[s.rating] + '">' + badgeLabel[s.rating] + '</span>' +
          '</div>';
      }).join('');

      document.getElementById('scorecard-form').style.display = 'none';
      document.getElementById('results-shell').classList.add('visible');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetScorecard() {
      document.getElementById('scorecard-form').style.display = '';
      document.getElementById('results-shell').classList.remove('visible');
      metrics.forEach(function(m, i) {
        var n = i + 1;
        document.getElementById('m' + n + '-val').value = '';
        document.getElementById('m' + n + '-val').disabled = false;
        document.getElementById('m' + n + '-unknown').checked = false;
      });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
