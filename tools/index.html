<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" href="/favicon.png" sizes="32x32">

  <title><!-- Tools index title (50-60 chars) | SITE NAME --></title>
  <meta name="description" content="<!-- Meta description 140-160 chars -->">
  <link rel="canonical" href="https://<!-- DOMAIN -->/tools/">

  <meta property="og:title" content="<!-- OG title -->">
  <meta property="og:description" content="<!-- OG description -->">
  <meta property="og:url" content="https://<!-- DOMAIN -->/tools/">
  <meta property="og:type" content="website">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://<!-- DOMAIN -->" },
      { "@type": "ListItem", "position": 2, "name": "Tools", "item": "https://<!-- DOMAIN -->/tools/" }
    ]
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ItemList",
    "name": "<!-- List name -->",
    "description": "<!-- List description -->",
    "url": "https://<!-- DOMAIN -->/tools/",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "url": "https://<!-- DOMAIN -->/tools/<!-- TOOL-SLUG -->/", "name": "<!-- Tool name -->" }
    ]
  }
  </script>

  <style>:root{--accent:#000000;--accent-dim:#000000;--accent-pale:#f5f5f5}</style>
  <link rel="stylesheet" href="/styles.css">
  <script src="/config.js" defer></script>

  <style>
    .tool-list { list-style: none; padding: 0; margin-bottom: 32px; }
    .tool-list li { border-bottom: var(--hairline); }
    .tool-list li:last-child { border-bottom: none; }
    .tool-list a {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 14px 0;
      color: var(--charcoal);
      text-decoration: none;
    }
    .tool-list a:hover .tool-list-name { color: var(--accent); }
    .tool-list-body { flex: 1; }
    .tool-list-name { font-size: var(--small); font-weight: 700; margin-bottom: 2px; }
    .tool-list-desc { font-size: 12px; color: var(--mid); line-height: 1.5; }
    .tool-list-tag {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 4px;
      display: block;
    }
    .tool-list-arrow { color: var(--border); font-size: 11px; padding-top: 2px; flex-shrink: 0; }
    .tool-list a:hover .tool-list-arrow { color: var(--accent); }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="topbar-brand"><!-- SITE NAME HTML --></div>
    <div class="topbar-divider"></div>
    <div class="topbar-tagline"><!-- SITE TAGLINE --></div>
    <div class="topbar-right"><a href="/subscribe">Subscribe</a></div>
  </header>

  <div class="layout">
    <nav class="sidebar" aria-label="Site navigation">
      <div id="sidebar-nav"></div>
    </nav>

    <main class="main">
      <div class="content">

        <div class="breadcrumb">
          <a href="/">Home</a>
          <span class="breadcrumb-sep">/</span>
          <span>Tools</span>
        </div>

        <span class="page-label">Free Tools</span>
        <h1><!-- Tools H1 --></h1>

        <p class="lead"><!-- Lead: what kind of decisions the tools help with, and any access requirements (email, signup). --></p>

        <ul class="tool-list">
          <li>
            <a href="/tools/<!-- TOOL-SLUG -->/">
              <div class="tool-list-body">
                <span class="tool-list-tag"><!-- Category: Evaluation / Compliance / Architecture / Operations --></span>
                <div class="tool-list-name"><!-- CONTENT: Tool name --></div>
                <div class="tool-list-desc"><!-- CONTENT: Tool description — what it does, what output it produces. --></div>
              </div>
              <span class="tool-list-arrow">&rsaquo;</span>
            </a>
          </li>
          <!-- Repeat <li> for each tool -->
        </ul>

        <div class="newsletter-block">
          <span class="page-label">Stay current</span>
          <p><!-- Newsletter pitch. --></p>
          <div class="newsletter-form">
            <input type="email" id="nl-email" placeholder="your@email.com" autocomplete="email">
            <button id="nl-submit" type="button">Subscribe</button>
          </div>
          <div id="nl-msg" style="font-size:11px; color:var(--mid); margin-top:8px; min-height:16px;"></div>
        </div>

        <div class="page-footer">
          <span class="page-label"><!-- SITE NAME --></span>
          <p>An independent publication. Built by <a href="<!-- PUBLISHER URL -->"><!-- PUBLISHER NAME --></a>.</p>
        </div>

      </div>
    </main>
  </div>

  <script src="/nav.js"></script>
  <script src="/newsletter.js"></script>
</body>
</html>
