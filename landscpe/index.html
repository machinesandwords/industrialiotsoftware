<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" href="/favicon.png" sizes="32x32">

  <!-- SEO: Update for each page -->
  <title><!-- PAGE TITLE --> — <!-- SITE NAME --></title>
  <meta name="description" content="<!-- META DESCRIPTION (150–160 chars) -->">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://<!-- DOMAIN -->/landscape/<!-- SLUG -->">

  <meta property="og:type" content="article">
  <meta property="og:title" content="<!-- PAGE TITLE -->">
  <meta property="og:description" content="<!-- META DESCRIPTION -->">
  <meta property="og:url" content="https://<!-- DOMAIN -->/landscape/<!-- SLUG -->">
  <meta property="og:site_name" content="<!-- SITE NAME -->">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": "<!-- PAGE TITLE -->",
    "description": "<!-- META DESCRIPTION -->",
    "url": "https://<!-- DOMAIN -->/landscape/<!-- SLUG -->",
    "publisher": {
      "@type": "Organization",
      "name": "<!-- SITE NAME -->",
      "url": "https://<!-- DOMAIN -->"
    },
    "breadcrumb": {
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://<!-- DOMAIN -->" },
        { "@type": "ListItem", "position": 2, "name": "Landscape", "item": "https://<!-- DOMAIN -->/landscape" },
        { "@type": "ListItem", "position": 3, "name": "<!-- PAGE TITLE -->", "item": "https://<!-- DOMAIN -->/landscape/<!-- SLUG -->" }
      ]
    }
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="/config.js"></script>

  <style>
    /* Wider content for matrix tables */
    .content { max-width: 1000px; }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }
    /* Shop size badges — customize labels/colors per site */
    .size-sm  { background: #dbeafe; color: #1e40af; }
    .size-mid { background: #fef3c7; color: #92400e; }
    .size-lg  { background: #fee2e2; color: #991b1b; }

    /* Pricing badges */
    .price-free { background: #d1fae5; color: #065f46; }
    .price-low  { background: #dbeafe; color: #1e40af; }
    .price-mid  { background: #fef3c7; color: #92400e; }
    .price-high { background: #fee2e2; color: #991b1b; }

    /* Legend */
    .legend {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
      font-size: 12px;
      align-items: center;
    }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; }
    .legend-break { flex-basis: 100%; height: 0; }

    /* Matrix table */
    .section-header td {
      background: var(--bg);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--mid);
      border-top: 1px solid var(--charcoal);
      padding-top: 0.75rem;
    }
    .vendor-name { font-weight: 700; }
    .note { color: var(--mid); font-size: 12px; font-style: italic; margin-top: 0.2rem; }
    .check   { color: #059669; font-weight: 700; }
    .partial { color: #d97706; font-weight: 700; }
    .no      { color: var(--faint); }
    .size-cell { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-top: 0.35rem; }

    /* Decision framework */
    .tier-block {
      border: var(--hairline);
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }
    .tier-title {
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 0.6rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .tier-body { font-size: 13px; line-height: 1.75; color: var(--charcoal); }
    .tier-body strong { font-weight: 700; }

    /* Caveat notice */
    .caveat {
      color: #b45309;
      font-size: 12px;
      background: #fffbeb;
      border: 1px solid #fcd34d;
      padding: 0.5rem 0.75rem;
      margin-bottom: 1.5rem;
      display: inline-block;
    }

    /* Market gap block */
    .gap-block {
      border-color: #fcd34d;
      background: #fffbeb;
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="topbar-brand"><!-- SITE BRAND HTML --></div>
    <div class="topbar-divider"></div>
    <div class="topbar-tagline"><!-- TAGLINE --></div>
    <div class="topbar-right"><a href="/subscribe">Subscribe</a></div>
  </header>

  <div class="layout">
    <nav class="sidebar" aria-label="Site navigation">
      <div id="sidebar-nav"></div>
    </nav>

    <main class="main">
      <div class="content">

        <div class="breadcrumb">
          <a href="/">Home</a>
          <span class="breadcrumb-sep">/</span>
          <a href="/landscape">Landscape</a>
          <span class="breadcrumb-sep">/</span>
          <span><!-- PAGE TITLE --></span>
        </div>

        <span class="page-label">Landscape</span>
        <h1><!-- H1 HEADLINE --></h1>
        <p><!-- 1-line context: audience, scope, date verified --></p>

        <!-- Optional caveat if market is early-stage or data is limited -->
        <p class="caveat">&#9888; <!-- CAVEAT TEXT --></p>

        <!-- Legend -->
        <div class="legend">
          <strong><!-- SIZE LABEL e.g. Shop size: --></strong>
          <div class="legend-item"><span class="badge size-sm"><!-- SMALL --></span></div>
          <div class="legend-item"><span class="badge size-mid"><!-- MID --></span></div>
          <div class="legend-item"><span class="badge size-lg"><!-- LARGE --></span></div>
          <div class="legend-break"></div>
          <strong>Pricing:</strong>
          <div class="legend-item"><span class="badge price-free">Free / OSS</span></div>
          <div class="legend-item"><span class="badge price-low"><!-- LOW RANGE --></span></div>
          <div class="legend-item"><span class="badge price-mid"><!-- MID RANGE --></span></div>
          <div class="legend-item"><span class="badge price-high">Quote / custom</span></div>
          <div class="legend-break"></div>
          <div class="legend-item"><span class="check">&#10003;</span> Core feature</div>
          <div class="legend-item"><span class="partial">&#9680;</span> Partial / limited</div>
          <div class="legend-item"><span class="no">&#8212;</span> Not supported</div>
        </div>

        <!-- Matrix table -->
        <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:15%">Feature</th>
              <th style="width:28%">Vendor / Product</th>
              <th style="width:16%">Pricing</th>
              <th style="width:41%">Notes &amp; fit</th>
            </tr>
          </thead>
          <tbody>

            <!-- ── FEATURE CATEGORY 1 ─────────────────────── -->
            <tr class="section-header"><td colspan="4"><!-- CATEGORY NAME --></td></tr>

            <tr>
              <td></td>
              <td><span class="check">&#10003;</span> <span class="vendor-name"><!-- VENDOR NAME --></span></td>
              <td><span class="badge price-low"><!-- PRICE --></span></td>
              <td><!-- NOTES -->
                <div class="size-cell">
                  <span class="badge size-sm"><!-- SIZE --></span>
                  <span class="badge size-mid"><!-- SIZE --></span>
                </div>
              </td>
            </tr>

            <tr>
              <td></td>
              <td><span class="partial">&#9680;</span> <span class="vendor-name"><!-- VENDOR NAME --></span></td>
              <td><span class="badge price-mid"><!-- PRICE --></span></td>
              <td><!-- NOTES -->
                <div class="size-cell">
                  <span class="badge size-sm"><!-- SIZE --></span>
                </div>
              </td>
            </tr>

            <!-- ── FEATURE CATEGORY 2 ─────────────────────── -->
            <tr class="section-header"><td colspan="4"><!-- CATEGORY NAME --></td></tr>

            <tr>
              <td></td>
              <td><span class="check">&#10003;</span> <span class="vendor-name"><!-- VENDOR NAME --></span></td>
              <td><span class="badge price-free"><!-- PRICE --></span></td>
              <td><!-- NOTES -->
                <div class="size-cell">
                  <span class="badge size-sm"><!-- SIZE --></span>
                  <span class="badge size-mid"><!-- SIZE --></span>
                  <span class="badge size-lg"><!-- SIZE --></span>
                </div>
              </td>
            </tr>

            <!-- Add more categories and vendors as needed -->
            <!-- Copy a tr block, change check/partial/no, update content -->

          </tbody>
        </table>
        </div>

        <!-- Decision framework -->
        <h2>Decision framework: <!-- FRAMING e.g. what you need by org size --></h2>

        <div class="tier-block">
          <div class="tier-title"><span class="badge size-sm"><!-- SMALL TIER LABEL --></span> <!-- TIER DESCRIPTION --></div>
          <div class="tier-body">
            <strong><!-- AREA -->:</strong> <!-- RECOMMENDATION --><br>
            <strong><!-- AREA -->:</strong> <!-- RECOMMENDATION --><br>
            <strong>Avoid:</strong> <!-- WHAT TO SKIP AND WHY -->
          </div>
        </div>

        <div class="tier-block">
          <div class="tier-title"><span class="badge size-mid"><!-- MID TIER LABEL --></span> <!-- TIER DESCRIPTION --></div>
          <div class="tier-body">
            <strong><!-- AREA -->:</strong> <!-- RECOMMENDATION --><br>
            <strong><!-- AREA -->:</strong> <!-- RECOMMENDATION --><br>
            <strong>The stack reality:</strong> <!-- HONEST ASSESSMENT OF GAPS -->
          </div>
        </div>

        <div class="tier-block">
          <div class="tier-title"><span class="badge size-lg"><!-- LARGE TIER LABEL --></span> <!-- TIER DESCRIPTION --></div>
          <div class="tier-body">
            <strong><!-- AREA -->:</strong> <!-- RECOMMENDATION --><br>
            <strong><!-- AREA -->:</strong> <!-- RECOMMENDATION -->
          </div>
        </div>

        <!-- Market gap block — use when there's a notable unmet need -->
        <div class="tier-block gap-block">
          <div class="tier-title">The verified market gap</div>
          <div class="tier-body">
            <!-- Honest assessment of what no current tool covers. Be specific. -->
          </div>
        </div>

        <div class="page-footer">
          <span class="page-label">Sources</span>
          <p><!-- SOURCE NOTE e.g. Vendors verified via public sources [Month YYYY]. --></p>
        </div>

      </div>
    </main>
  </div>

  <script src="/nav.js"></script>
  <script src="/newsletter.js"></script>
</body>
</html>
